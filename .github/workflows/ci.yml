name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: plg_editorjs_button

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clone klucon-cms (sibling dir)
        env:
          KLUCON_CI_TOKEN: ${{ secrets.KLUCON_CI_TOKEN }}
        run: |
          if ! git clone --depth 1 https://github.com/klucon/klucon-cms.git klucon-cms; then
            if [ -z "${KLUCON_CI_TOKEN:-}" ]; then
              echo "Set GitHub secret KLUCON_CI_TOKEN with read access to klucon/klucon-cms."
              exit 1
            fi
            git -c http.https://github.com/.extraheader="AUTHORIZATION: bearer ${KLUCON_CI_TOKEN}" \
              clone --depth 1 https://github.com/klucon/klucon-cms.git klucon-cms
          fi

      - name: Clone plg_editorjs (sibling dir)
        env:
          KLUCON_CI_TOKEN: ${{ secrets.KLUCON_CI_TOKEN }}
        run: |
          mkdir -p plugin
          if ! git clone --depth 1 https://github.com/klucon/plg_editorjs.git plugin/plg_editorjs; then
            if [ -z "${KLUCON_CI_TOKEN:-}" ]; then
              echo "Set GitHub secret KLUCON_CI_TOKEN with read access to klucon/plg_editorjs."
              exit 1
            fi
            git -c http.https://github.com/.extraheader="AUTHORIZATION: bearer ${KLUCON_CI_TOKEN}" \
              clone --depth 1 https://github.com/klucon/plg_editorjs.git plugin/plg_editorjs
          fi

      - name: Move plugin to plugin/ subdir (match dev layout)
        run: mv plg_editorjs_button plugin/plg_editorjs_button

      - name: Install dependencies
        working-directory: plugin/plg_editorjs_button
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pytest build pytest-asyncio httpx aiosqlite sqlalchemy fastapi jinja2 pydantic pydantic-settings python-multipart itsdangerous PyJWT bcrypt email-validator
          (cd ../../klucon-cms && python -m pip install -e ".[dev]" 2>/dev/null || python -m pip install -e .)
          python -m pip install -e ".[dev]" || python -m pip install -e .

      - name: Lint
        working-directory: plugin/plg_editorjs_button
        run: ruff check .

      - name: Validate JSON files
        working-directory: plugin/plg_editorjs_button
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for path in sorted(Path(".").rglob("*.json")):
              if any(part.startswith(".") for part in path.parts):
                  continue
              json.loads(path.read_text(encoding="utf-8"))
          PY

      - name: Compile
        working-directory: plugin/plg_editorjs_button
        run: |
          targets=()
          [ -d src ] && targets+=(src)
          [ -d tests ] && targets+=(tests)
          [ "${#targets[@]}" -eq 0 ] || python -m compileall -q "${targets[@]}"

      - name: Test
        working-directory: plugin/plg_editorjs_button
        run: |
          if [ -d tests ]; then
            pytest -q
          fi

      - name: Build
        working-directory: plugin/plg_editorjs_button
        run: |
          if [ -f pyproject.toml ]; then
            python -m build
          fi
